<section data-fragment="main">
    <header class="page-header" aria-label="Page header">
        <div class="page-chip" aria-hidden="true">
            <span class="icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings2-icon lucide-settings-2" focusable="false" aria-hidden="true">
                    <path d="M14 17H5"/>
                    <path d="M19 7h-9"/>
                    <circle cx="17" cy="17" r="3"/>
                    <circle cx="7" cy="7" r="3"/>
                </svg>
            </span>
            <span>Settings</span>
        </div>
    </header>

    <section class="card" aria-labelledby="lmstudio-title">
        <h2 class="card-title" id="lmstudio-title">LM Studio</h2>
        <div class="option-row">
            <label for="lmstudio-url-input">Server URL</label>
            <div class="input-group">
                <input id="lmstudio-url-input" class="text-input" type="text" placeholder="http://localhost:1234" autocomplete="off" spellcheck="false" style="flex: 1;" />
                <span id="lmstudio-status" class="badge" style="flex-shrink: 0;">—</span>
                <button type="button" id="refresh-lmstudio-status" class="btn">Test</button>
            </div>
        </div>
    </section>

    <section class="card" aria-labelledby="ai-behaviour-title">
        <h2 class="card-title" id="ai-behaviour-title">AI Behaviour</h2>
        <div class="option-row">
            <label for="default-model-input">Default Model</label>
            <input id="default-model-input" class="text-input" type="text" placeholder="e.g. lmstudio::llama-3-8b-instruct" autocomplete="off" spellcheck="false" />
        </div>
        <div class="option-row">
            <label for="temperature-input">Temperature</label>
            <div class="input-group" style="gap: 0.75rem; align-items: center;">
                <input id="temperature-slider" type="range" min="0" max="2" step="0.01" value="0.7" style="flex: 1; min-width: 0;" />
                <input id="temperature-input" type="number" min="0" max="2" step="0.01" value="0.7" style="flex: none; width: 5rem;" />
            </div>
        </div>
        <div class="option-row">
            <label for="max-tokens-input">Max Output Tokens</label>
            <input id="max-tokens-input" type="number" min="256" max="131072" step="256" value="8192" style="width: 8rem;" />
        </div>
        <div class="option-row">
            <label for="system-prompt-input">System Prompt</label>
            <textarea id="system-prompt-input" class="system-prompt-input" rows="6" placeholder="Enter a system prompt…"></textarea>
        </div>
        <div class="input-group" style="margin-top: 0.75rem;">
            <button type="button" id="save-ai-settings" class="btn btn-primary">Save</button>
            <span id="ai-settings-status" class="option-hint" style="margin-left: 0.5rem;"></span>
        </div>
    </section>

    <section class="card" aria-labelledby="llamacpp-backend-title">
        <h2 class="card-title" id="llamacpp-backend-title">Hardware Backend</h2>

        <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:6px;border:1px solid var(--border);background:color-mix(in srgb,var(--panel) 80%,transparent);font-size:0.88rem;">
            <span style="color:var(--muted);">Active:</span>
            <span id="llamacpp-active-backend-label" style="font-family:ui-monospace,monospace;color:var(--accent);font-weight:600;">—</span>
        </div>

        <div class="option-row">
            <label id="backend-selector-label">Preference</label>
            <div id="llamacpp-backend-selector" role="radiogroup" aria-labelledby="backend-selector-label" style="display:flex;flex-direction:column;gap:8px;">
                <span id="llamacpp-backend-loading" style="color:var(--muted);font-size:0.85rem;">Loading…</span>
            </div>
        </div>

        <div class="option-row">
            <label for="llamacpp-tag-input">llama.cpp Tag</label>
            <input id="llamacpp-tag-input" class="text-input" type="text" value="b8391" placeholder="e.g. b8391" autocomplete="off" spellcheck="false" style="width:9rem;" />
        </div>

        <div class="input-group" style="margin-top:0.75rem;">
            <button type="button" id="save-llamacpp-backend" class="btn btn-primary">Apply</button>
            <span id="llamacpp-backend-save-status" class="option-hint" style="margin-left:0.5rem;"></span>
        </div>

        <div id="llamacpp-build-progress" hidden style="margin-top:1rem;border:1px solid var(--border);padding:12px;background:color-mix(in srgb,var(--panel) 60%,transparent);">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <span id="llamacpp-build-progress-label" style="font-size:0.88rem;color:var(--muted);flex:1;">Building…</span>
                <span id="llamacpp-build-progress-pct" style="font-size:0.8rem;color:var(--accent);font-family:ui-monospace,monospace;flex-shrink:0;"></span>
            </div>
            <div style="height:6px;background:color-mix(in srgb,var(--border) 60%,transparent);overflow:hidden;">
                <div id="llamacpp-build-progress-bar" style="height:100%;width:0%;background:var(--accent);transition:width 0.4s ease;"></div>
            </div>
            <div id="llamacpp-build-log-tail" style="margin-top:8px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:0.74rem;color:var(--muted);max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;line-height:1.4;"></div>
        </div>
    </section>

    <section class="card" aria-labelledby="llamacpp-title">
        <h2 class="card-title" id="llamacpp-title">llama.cpp</h2>

        <div class="option-row">
            <span>Flash Attention</span>
            <label class="toggle-switch" style="width: fit-content;">
                <input id="llamacpp-flash-attn" type="checkbox" checked />
                <span class="toggle-track"></span>
            </label>
        </div>
        <div class="option-row">
            <label for="llamacpp-eval-batch-size">Eval Batch Size</label>
            <input id="llamacpp-eval-batch-size" type="number" min="64" max="16384" step="64" value="2048" style="width:8rem;" />
        </div>
        <div class="option-row">
            <label for="llamacpp-ctx-size">Context Size</label>
            <input id="llamacpp-ctx-size" type="number" min="0" max="524288" step="512" value="0" style="width:8rem;" />
        </div>
        <div class="option-row">
            <label for="llamacpp-ctx-size">Context Size</label>
            <input id="llamacpp-ctx-size" type="number" min="0" max="524288" step="512" value="0" style="width:8rem;" />
        </div>
        <div class="option-row">
            <label for="llamacpp-gpu-layers">GPU Layers</label>
            <input id="llamacpp-gpu-layers" type="number" min="0" max="999" step="1" value="0" style="width:8rem;" />
        </div>
        <div class="option-row">
            <label>CPU Threads</label>
            <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
                <div>
                    <label for="llamacpp-threads" style="font-size:0.8rem;opacity:0.75;">Generation</label>
                    <div><input id="llamacpp-threads" type="number" min="0" max="256" step="1" value="0" style="width:6rem;" /></div>
                </div>
                <div>
                    <label for="llamacpp-threads-batch" style="font-size:0.8rem;opacity:0.75;">Batch</label>
                    <div><input id="llamacpp-threads-batch" type="number" min="0" max="256" step="1" value="0" style="width:6rem;" /></div>
                </div>
            </div>
        </div>
        <div class="option-row">
            <label for="llamacpp-top-p">Top-P</label>
            <div class="input-group" style="gap:0.75rem;align-items:center;">
                <input id="llamacpp-top-p-slider" type="range" min="0" max="1" step="0.01" value="0.9" style="flex:1;min-width:0;" />
                <input id="llamacpp-top-p" type="number" min="0" max="1" step="0.01" value="0.9" style="flex:none;width:5rem;" />
            </div>
        </div>
        <div class="option-row">
            <label for="llamacpp-min-p">Min-P</label>
            <div class="input-group" style="gap:0.75rem;align-items:center;">
                <input id="llamacpp-min-p-slider" type="range" min="0" max="1" step="0.01" value="0.05" style="flex:1;min-width:0;" />
                <input id="llamacpp-min-p" type="number" min="0" max="1" step="0.01" value="0.05" style="flex:none;width:5rem;" />
            </div>
        </div>
        <div class="option-row">
            <label for="llamacpp-repeat-penalty">Repetition Penalty</label>
            <div class="input-group" style="gap:0.75rem;align-items:center;">
                <input id="llamacpp-repeat-penalty-slider" type="range" min="1" max="2" step="0.01" value="1.15" style="flex:1;min-width:0;" />
                <input id="llamacpp-repeat-penalty" type="number" min="1" max="2" step="0.01" value="1.15" style="flex:none;width:5rem;" />
            </div>
        </div>
        <div class="input-group" style="margin-top:0.75rem;">
            <button type="button" id="save-llamacpp-settings" class="btn btn-primary">Save</button>
            <span id="llamacpp-settings-status" class="option-hint" style="margin-left:0.5rem;"></span>
        </div>
    </section>

    <section class="card" aria-labelledby="theme-title">
        <h2 class="card-title" id="theme-title">Theme</h2>
        <div class="option-row">
            <label id="palette-label">Palette</label>
            <div class="palette-list" data-palette-list role="radiogroup" aria-labelledby="palette-label"></div>
        </div>
        <div class="option-row">
            <label id="flavour-label">Variant</label>
            <div class="flavour-list" data-flavour-list role="radiogroup" aria-labelledby="flavour-label"></div>
        </div>
        <div class="option-row">
            <label id="accent-label">Accent</label>
            <div class="accent-grid" data-accent-grid role="radiogroup" aria-labelledby="accent-label"></div>
        </div>
    </section>
</section>
