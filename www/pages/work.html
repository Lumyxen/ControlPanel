<section>
	<div class="wrap">
		<div class="block-text">Projects</div>
		<div id="projects-grid" class="grid"></div>

		<div id="project-viewer" role="dialog" aria-modal="true" aria-label="Project viewer" hidden>
			<div id="project-viewer-backdrop" aria-hidden="true"></div>
			<div id="project-viewer-frame">
				<div class="viewer-header">
					<div class="viewer-title-section">
						<h3 id="project-viewer-title" class="viewer-title">Project Title</h3>
						<div id="project-viewer-tags" class="lang-pills"></div>
						<div id="project-viewer-stats" class="code-stats"></div>
					</div>
					<div class="viewer-controls">
						<button id="project-viewer-close" type="button">Close [Esc]</button>
					</div>
				</div>
				<div class="viewer-content">
					<div class="viewer-section">
						<h4>Description</h4>
						<p id="project-viewer-description"></p>
					</div>
					<div id="project-viewer-features" class="viewer-section"></div>
					<div id="project-viewer-technologies" class="viewer-section"></div>
					<div id="project-viewer-links" class="viewer-section links-section"></div>
				</div>
			</div>
		</div>
	</div>
</section>
