<section class="photos-section">
	<div class="wrap photos-wrap">
		<div class="block-text">Photography Gallery</div>

		<div id="photo-scroller" class="photos-scroller" role="region" aria-label="Photos" tabindex="0">
			<div id="photo-grid" class="grid" aria-live="polite"></div>
		</div>

		<div id="photo-viewer" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
			<div id="photo-viewer-backdrop" aria-hidden="true"></div>
			<div id="photo-viewer-frame">
				<div class="viewer-header">
					<h3 id="photo-viewer-title" class="viewer-title">Photo Title</h3>
					<div id="photo-viewer-filename" class="viewer-filename">filename.jpg</div>
					<div class="viewer-controls">
						<button id="photo-viewer-download" type="button" title="Download image"><span>Download</span></button>
						<button id="photo-viewer-close" type="button">Close [Esc]</button>
					</div>
				</div>
				<div id="photo-viewer-figure" class="viewer-image-container">
					<img id="photo-viewer-img" alt="" />
				</div>
				<div class="viewer-footer">
					<div id="photo-viewer-metadata" class="metadata-container"></div>
				</div>
			</div>
		</div>
	</div>
</section>
