<section data-fragment="main" class="chat-page">
    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty" id="chatEmpty">
                <p>Start a conversation</p>
            </div>
        </div>

        <form class="chat-form" id="chatForm">
            <button type="button" id="scrollToBottomBtn" class="scroll-to-bottom-btn" aria-label="Scroll to bottom" title="Scroll to bottom">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
            </button>
            <div
                id="chatInput"
                class="chat-input"
                contenteditable="true"
                role="textbox"
                aria-label="Message input"
                aria-multiline="true"
                data-placeholder="Type your message here..."
            ></div>

            <div class="chat-toolbar">
                <div class="chat-toolbar-left">
                    <div class="chat-dropdown" data-dropdown="model">
                        <button
                            type="button"
                            class="chat-dropdown-toggle chat-dropdown-plain"
                            aria-haspopup="listbox"
                            aria-expanded="false"
                        >
                            <span class="chat-dropdown-label">Select a model...</span>
                            <span
                                class="chat-dropdown-chevron"
                                aria-hidden="true"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </span>
                        </button>
                        <div class="chat-dropdown-menu" role="listbox">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="chat-dropdown" data-dropdown="tools" data-multi>
                        <button
                            type="button"
                            class="chat-dropdown-toggle chat-dropdown-icon-only"
                            aria-haspopup="menu"
                            aria-expanded="false"
                            aria-label="Tools"
                            title="Tools"
                        >
                            <span class="chat-dropdown-icon" aria-hidden="true">
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="lucide lucide-wrench-icon lucide-wrench"
                                >
                                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.106-3.105c.32-.322.863-.22.983.218a6 6 0 0 1-8.259 7.057l-7.91 7.91a1 1 0 0 1-2.999-3l7.91-7.91a6 6 0 0 1 7.057-8.259c.438.12.54.662.219.984z"/>
                                </svg>
                            </span>
                            <span
                                class="chat-dropdown-chevron"
                                aria-hidden="true"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                >
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </span>
                        </button>

                        <div
                            class="chat-dropdown-menu chat-tools-menu"
                            role="menu"
                        >
                            <label class="chat-tool-toggle">
                                <input
                                    type="checkbox"
                                    name="tool"
                                    value="web-search"
                                />
                                <span class="chat-tool-check" aria-hidden="true">
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="3"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path d="M20 6L9 17l-5-5" />
                                    </svg>
                                </span>
                                <span class="chat-tool-label">Web Search</span>
                            </label>
                            <label class="chat-tool-toggle">
                                <input
                                    type="checkbox"
                                    name="tool"
                                    value="code-exec"
                                />
                                <span class="chat-tool-check" aria-hidden="true">
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="3"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path d="M20 6L9 17l-5-5" />
                                    </svg>
                                </span>
                                <span class="chat-tool-label"
                                    >Code Execution</span
                                >
                            </label>
                            <label class="chat-tool-toggle">
                                <input
                                    type="checkbox"
                                    name="tool"
                                    value="file-read"
                                />
                                <span class="chat-tool-check" aria-hidden="true">
                                    <svg
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="3"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    >
                                        <path d="M20 6L9 17l-5-5" />
                                    </svg>
                                </span>
                                <span class="chat-tool-label">File Reading</span>
                            </label>
                        </div>
                    </div>

                    <button
                        type="button"
                        class="chat-toolbar-btn"
                        id="chatUploadBtn"
                        aria-label="Upload files"
                        title="Upload files"
                    >
                        <span class="chat-toolbar-btn-icon" aria-hidden="true">
                            <svg
                                viewBox="0 0 24 24"
                                fill="none"
                                xmlns="http://www.w3.org/2000/svg"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="lucide lucide-upload-icon lucide-upload"
                            >
                                <path d="M12 3v12"/>
                                <path d="m17 8-5-5-5 5"/>
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            </svg>
                        </span>
                        <span id="chatUploadLabel">Upload</span>
                    </button>
                    <input id="chatUploadInput" type="file" multiple hidden />
                </div>

                <div class="chat-toolbar-right">
                    <div
                        class="chat-context"
                        id="chatContext"
                        aria-label="Context window usage"
                        title="Context usage"
                    >
                        0/0
                    </div>

                    <button
                        type="submit"
                        class="chat-send-btn"
                        aria-label="Send message"
                        title="Send"
                    >
                        <svg
                            viewBox="0 0 48 48"
                            xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true"
                        >
                            <path
                                d="M44.9,23.2l-38-18L6,5A2,2,0,0,0,4,7l6,18L4,43a2,2,0,0,0,2,2l.9-.2,38-18A2,2,0,0,0,44.9,23.2ZM9.5,39.1l4-12.1H24a2,2,0,0,0,0-4H13.5l-4-12.1L39.3,25Z"
                                fill="currentColor"
                            />
                        </svg>
                    </button>
                </div>
            </div>
        </form>
    </div>
</section>
