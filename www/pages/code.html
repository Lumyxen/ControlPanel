<section>
	<div class="wrap">
		<div class="block-text">Code Scripts & Snippets</div>
		<div id="code-grid" class="grid"></div>

		<div id="code-viewer" role="dialog" aria-modal="true" aria-label="Code snippet viewer" hidden>
			<div id="code-viewer-backdrop" aria-hidden="true"></div>
			<div id="code-viewer-frame">
				<div class="viewer-header">
					<div class="viewer-title-section">
						<h3 id="code-viewer-title" class="viewer-title">Snippet Title</h3>
						<div id="code-viewer-langs" class="lang-pills"></div>
						<div id="code-viewer-stats" class="code-stats"></div>
					</div>
					<div class="viewer-controls">
						<button id="code-viewer-close" type="button">Close [Esc]</button>
					</div>
				</div>
				<div class="viewer-content">
					<div class="viewer-section">
						<h4>Description</h4>
						<p id="code-viewer-description"></p>
					</div>
					<div id="code-viewer-features" class="viewer-section"></div>
					<div id="code-viewer-usage" class="viewer-section"></div>
					<div id="code-viewer-links" class="viewer-section links-section"></div>
				</div>
			</div>
		</div>
	</div>
</section>
