<!DOCTYPE html>
<html lang="en" data-theme="everforest-harddark-green">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="color-scheme" content="dark" />
		<title>Control Panel Login</title>
		<style>
			:root,
			html[data-theme='everforest-harddark-green'] {
				/* Everforest Dark Hard palette */
				--ef-bg-dim: #1e2326;
				--ef-bg0: #272e33;
				--ef-bg1: #2e383c;
				--ef-bg2: #374145;
				--ef-bg3: #414b50;
				--ef-bg4: #495156;
				--ef-fg: #d3c6aa;
				--ef-grey0: #7a8478;
				--ef-grey1: #859289;
				--ef-grey2: #9da9a0;
				--ef-green: #a7c080;
				--ef-red: #e67e80;
				--ef-orange: #e69875;
				--ef-yellow: #dbbc7f;
				--ef-aqua: #83c092;
				--ef-blue: #7fbbb3;
				--ef-purple: #d699b6;

				--bg: var(--ef-bg-dim);
				--panel: var(--ef-bg0);
				--text: var(--ef-fg);
				--muted: var(--ef-grey1);
				--border: var(--ef-bg2);
				--accent: var(--ef-green);
				--danger: var(--ef-red);

				--radius-none: 0px;
				--transition: 200ms ease;

				--cx: 50%;
				--cy: 50%;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				height: 100%;
			}

			body {
				margin: 0;
				color: var(--text);
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
					sans-serif;
				background-color: var(--bg);
				line-height: 1.4;
				position: relative;
				overflow: hidden;
			}

			body::after {
				content: '';
				position: fixed;
				inset: 0;
				pointer-events: none;
				background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='5' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.008'/%3E%3C/svg%3E");
				z-index: 0;
			}

			#stars {
				position: fixed;
				inset: 0;
				z-index: 0;
				pointer-events: none;
				display: block;
				background: transparent;
			}

			#glow {
				position: fixed;
				inset: 0;
				z-index: 1;
				pointer-events: none;
				background: radial-gradient(
					900px 900px at var(--cx) var(--cy),
					color-mix(in srgb, var(--accent) 20%, transparent) 0%,
					color-mix(in srgb, var(--accent) 5%, transparent) 0%,
					transparent 62%
				);
				opacity: 0.55;
				transition: background 200ms ease;
			}

			html[data-browser='firefox'] #glow,
			html[data-browser='ladybird'] #glow {
				display: none !important;
			}

			.center {
				position: relative;
				z-index: 2;
				height: 100%;
				display: grid;
				place-items: center;
				padding: 24px;
			}

			.login-card {
				width: min(86vmin, 420px);
				aspect-ratio: 1 / 1;
				border: 1px solid var(--accent);
				background: color-mix(in srgb, var(--panel) 100%, transparent);
				display: grid;
				grid-template-rows: auto 1fr;
				padding: 24px;
				gap: 16px;
			}

			.login-card h1 {
				margin: 0;
				text-align: center;
				font-size: 1.25rem;
				letter-spacing: 0.2px;
			}

			.fields {
				display: grid;
				align-content: center;
				gap: 12px;
			}

			.field {
				width: 100%;
				height: 40px;
				padding: 0 12px;
				color: var(--text);
				background: transparent;
				border: 1px solid var(--accent);
				border-radius: var(--radius-none);
				outline: none;
				box-shadow: none;
				font: inherit;
			}

			.field::placeholder {
				color: var(--muted);
				opacity: 1;
			}

			.field:focus {
				outline: none;
				box-shadow: 0 0 0 2px
					color-mix(in srgb, var(--accent) 35%, transparent);
			}

			.btn {
				height: 40px;
				width: 60%;
				margin: 20px auto 0;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				border: 1px solid var(--accent);
				background: transparent;
				color: var(--text);
				font: inherit;
				cursor: pointer;
				border-radius: var(--radius-none);
				transition: background var(--transition),
					border-color var(--transition), color var(--transition),
					box-shadow var(--transition), opacity var(--transition);
			}

			.btn:hover {
				background: color-mix(in srgb, var(--accent) 15%, transparent);
			}

			.btn:active {
				background: color-mix(in srgb, var(--accent) 25%, transparent);
			}

			.btn:focus-visible {
				outline: 2px solid var(--accent);
				outline-offset: 2px;
			}

			.btn[disabled] {
				opacity: 0.6;
				cursor: default;
			}

			.toast {
				position: fixed;
				top: 0;
				left: 50%;
				transform: translate(-50%, -100%);
				opacity: 0;
				z-index: 2000;
				padding: 10px 14px;
				min-width: 240px;
				max-width: 92vw;
				text-align: center;
				border: 1px solid var(--border);
				background: color-mix(in srgb, var(--panel) 85%, transparent);
				color: var(--text);
				box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
				transition: transform var(--transition),
					opacity var(--transition), border-color var(--transition),
					background var(--transition);
				pointer-events: auto;
				cursor: default;
			}

			.toast.show {
				transform: translate(-50%, 12px);
				opacity: 1;
			}

			.toast.error {
				border-color: color-mix(in srgb, var(--danger) 60%, transparent);
				background: color-mix(in srgb, var(--danger) 15%, var(--panel));
			}

			.toast.success {
				border-color: color-mix(in srgb, var(--accent) 60%, transparent);
				background: color-mix(in srgb, var(--accent) 15%, var(--panel));
			}

			@media (max-width: 380px) {
				.login-card {
					padding: 16px;
				}
				.field,
				.btn {
					height: 38px;
				}
				.btn {
					width: 70%;
				}
			}
		</style>
	</head>
	<body>
		<canvas id="stars" aria-hidden="true"></canvas>
		<div id="glow" aria-hidden="true"></div>
		<div
			id="toast"
			class="toast"
			role="status"
			aria-live="polite"
			aria-atomic="true"
		></div>
		<main class="center">
			<section class="login-card" aria-label="Login">
				<h1>Login</h1>
				<form class="fields" id="login-form" autocomplete="on" novalidate>
					<input
						class="field"
						id="username"
						name="username"
						type="text"
						autocomplete="username"
						placeholder="Username"
						aria-label="Username"
						autocapitalize="off"
						spellcheck="false"
						required
					/>
					<input
						class="field"
						id="password"
						name="password"
						type="password"
						autocomplete="current-password"
						placeholder="Password"
						aria-label="Password"
						required
					/>
					<input
						class="field"
						id="otp"
						name="otp"
						type="text"
						inputmode="numeric"
						pattern="[0-9]*"
						autocomplete="one-time-code"
						placeholder="2FA code"
						aria-label="Two-factor code"
					/>
					<button class="btn" id="submitBtn" type="submit">Log in</button>
				</form>
			</section>
		</main>
		<script>
			(function () {
				const form = document.getElementById('login-form');
				const btn = document.getElementById('submitBtn');
				const toast = document.getElementById('toast');
				const starsCanvas = document.getElementById('stars');

				let toastTimer = 0;
				let resizeTimer = 0;

				try {
					const ua = (navigator.userAgent || '').toLowerCase();
					if (ua.includes('ladybird')) {
						document.documentElement.setAttribute('data-browser', 'ladybird');
					} else if (ua.includes('firefox')) {
						document.documentElement.setAttribute('data-browser', 'firefox');
					}
				} catch {}

				function hideToast() {
					toast.classList.remove('show');
					clearTimeout(toastTimer);
					toastTimer = 0;
				}

				function showToast(kind, text, ms) {
					toast.textContent = text;
					toast.className = 'toast ' + kind;
					requestAnimationFrame(() => toast.classList.add('show'));
					clearTimeout(toastTimer);
					toastTimer = setTimeout(
						hideToast,
						typeof ms === 'number' ? ms : kind === 'success' ? 3000 : 4200
					);
				}

				form.addEventListener('submit', async (e) => {
					e.preventDefault();
					btn.disabled = true;
					showToast('success', 'UI wired. Connect backend before going live.');
					btn.disabled = false;
				});

				function positionGlow() {
					const card = document.querySelector('.login-card');
					if (!card) return;
					const r = card.getBoundingClientRect();
					const cx = ((r.left + r.width / 2) / window.innerWidth) * 100;
					const cy = ((r.top + r.height / 2) / window.innerHeight) * 100;
					document.documentElement.style.setProperty('--cx', cx.toFixed(2) + '%');
					document.documentElement.style.setProperty('--cy', cy.toFixed(2) + '%');
				}

				const rm = window.matchMedia('(prefers-reduced-motion: reduce)');

				let dpr = Math.min(window.devicePixelRatio || 1, 2);
				let ctx = null;
				let rafId = 0;
				let running = false;
				let lastTick = 0;

				const layers = [
					{ name: 'far', stars: [], speedX: 0, speedY: 0, sizeMin: 0.2, sizeMax: 0.8, twinkleMin: 0.6, twinkleMax: 1.4, alphaMin: 0.2, alphaMax: 0.55, share: 0.5 },
					{ name: 'mid', stars: [], speedX: 0, speedY: 0, sizeMin: 0.5, sizeMax: 1.2, twinkleMin: 0.8, twinkleMax: 2.0, alphaMin: 0.25, alphaMax: 0.65, share: 0.33 },
					{ name: 'near', stars: [], speedX: 0, speedY: 0, sizeMin: 0.9, sizeMax: 1.8, twinkleMin: 1.0, twinkleMax: 2.6, alphaMin: 0.3, alphaMax: 0.8, share: 0.17 }
				];

				function clamp(v, a, b) {
					return Math.max(a, Math.min(b, v));
				}

				function sizeCanvas() {
					if (!starsCanvas) return { w: 0, h: 0 };
					const w = Math.ceil(window.innerWidth);
					const h = Math.ceil(window.innerHeight);
					const cw = Math.round(w * dpr);
					const ch = Math.round(h * dpr);
					if (starsCanvas.width !== cw || starsCanvas.height !== ch) {
						starsCanvas.width = cw;
						starsCanvas.height = ch;
						starsCanvas.style.width = w + 'px';
						starsCanvas.style.height = h + 'px';
						if (ctx) ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
					}
					return { w, h };
				}

				function computeStarBudget(w, h) {
					let density = 0.0006;
					if (w < 480) density *= 0.8;
					if (dpr > 1.25) density *= 0.9;
					if (dpr > 1.75) density *= 0.8;
					return clamp(Math.round(w * h * density), 250, 2500);
				}

				function tintForStar() {
					const p = Math.random();
					if (p < 0.78) return null;
					if (p < 0.95) {
						// Cool aqua tint (Everforest aqua)
						return { h: 152 + Math.random() * 20, s: 28 + Math.random() * 25, l: 70 + Math.random() * 15 };
					}
					// Green accent tint (Everforest green)
					return { h: 95 + Math.random() * 20, s: 25 + Math.random() * 20, l: 68 + Math.random() * 12 };
				}

				function makeStar(w, h, layer) {
					const r = layer.sizeMin + Math.pow(Math.random(), 1.6) * (layer.sizeMax - layer.sizeMin);
					const baseAlpha = layer.alphaMin + Math.random() * (layer.alphaMax - layer.alphaMin);
					return {
						x: Math.random() * w,
						y: Math.random() * h,
						r,
						baseAlpha,
						twinkle: layer.twinkleMin + Math.random() * (layer.twinkleMax - layer.twinkleMin),
						phase: Math.random() * Math.PI * 2,
						tint: tintForStar()
					};
				}

				function regenerateStars(w, h) {
					const budget = computeStarBudget(w, h);
					layers.forEach((layer) => (layer.stars.length = 0));
					let remaining = budget;
					layers.forEach((layer, i) => {
						const count = i === layers.length - 1 ? remaining : Math.round(budget * layer.share);
						remaining -= count;
						for (let n = 0; n < count; n++) {
							layer.stars.push(makeStar(w, h, layer));
						}
					});
				}

				function drawStars(ts) {
					const isFirefox = document.documentElement.getAttribute('data-browser') === 'firefox';
					if (!ctx || !starsCanvas) return;

					const w = starsCanvas.width / dpr;
					const h = starsCanvas.height / dpr;

					ctx.clearRect(0, 0, w, h);

					let dt = 0;
					if (lastTick) dt = (ts - lastTick) / 1000;

					const halfPx = 0.5 / dpr;

					for (let li = 0; li < layers.length; li++) {
						const layer = layers[li];
						const twoPi = Math.PI * 2;
						const vx = layer.speedX / 60;
						const vy = layer.speedY / 60;

						for (let i = 0; i < layer.stars.length; i++) {
							const s = layer.stars[i];

							if (dt && !rm.matches) {
								if (!isFirefox || s.r >= 0.7) {
									s.x += vx * dt;
									s.y += vy * dt;
									if (s.x > w + 2) s.x = -2;
									if (s.x < -2) s.x = w + 2;
									if (s.y > h + 2) s.y = -2;
									if (s.y < -2) s.y = h + 2;
								}
							}

							const x = isFirefox ? Math.round(s.x * dpr) / dpr + halfPx : s.x;
							const y = isFirefox ? Math.round(s.y * dpr) / dpr + halfPx : s.y;
							const r = isFirefox ? Math.max(0.45, Math.round(s.r * dpr * 4) / (dpr * 4)) : s.r;

							const twinkleAmp = isFirefox && r < 0.6 ? 0.12 : 0.3;

							const alpha = clamp(
								s.baseAlpha * (0.85 + twinkleAmp * Math.sin(ts * 0.0015 * s.twinkle + s.phase)),
								0.12,
								0.9
							);

							if (s.tint) {
								ctx.fillStyle =
									'hsla(' +
									Math.round(s.tint.h) + ',' +
									Math.round(s.tint.s) + '%,' +
									Math.round(s.tint.l) + '%,' +
									alpha.toFixed(3) + ')';
							} else {
								ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(3) + ')';
							}

							ctx.beginPath();
							ctx.arc(x, y, r, 0, twoPi);
							ctx.fill();

							const showHalo =
								(!isFirefox && r > 1.0 && alpha > 0.2) ||
								(isFirefox && r > 1.3 && alpha > 0.25);
							if (showHalo) {
								ctx.fillStyle = 'rgba(255,255,255,' + (alpha * 0.08).toFixed(3) + ')';
								ctx.beginPath();
								ctx.arc(x, y, r * 2.1, 0, twoPi);
								ctx.fill();
							}
						}
					}
				}

				function tick(ts) {
					if (!running) return;
					const delta = ts - lastTick;
					if (!lastTick || delta >= 33) {
						drawStars(ts);
						lastTick = ts;
					}
					rafId = requestAnimationFrame(tick);
				}

				function startStars() {
					if (running) return;
					running = true;
					lastTick = 0;
					rafId = requestAnimationFrame(tick);
				}

				function stopStars() {
					running = false;
					if (rafId) cancelAnimationFrame(rafId);
					rafId = 0;
				}

				function initStars() {
					if (!starsCanvas || !starsCanvas.getContext) return;
					ctx = starsCanvas.getContext('2d', { alpha: true });
					const { w, h } = sizeCanvas();
					regenerateStars(w, h);

					if (rm.matches) {
						drawStars(0);
					} else {
						startStars();
					}

					rm.addEventListener('change', (e) => {
						if (e.matches) {
							stopStars();
							drawStars(0);
						} else {
							startStars();
						}
					});

					document.addEventListener('visibilitychange', () => {
						if (document.hidden) {
							stopStars();
						} else if (!rm.matches) {
							startStars();
						}
					});
				}

				positionGlow();
				initStars();

				window.addEventListener('resize', () => {
					clearTimeout(resizeTimer);
					resizeTimer = setTimeout(() => {
						dpr = Math.min(window.devicePixelRatio || 1, 2);
						positionGlow();
						const { w, h } = sizeCanvas();
						regenerateStars(w, h);
						if (rm.matches) drawStars(0);
					}, 120);
				});

				if (document.fonts && document.fonts.ready) {
					document.fonts.ready.then(positionGlow).catch(() => {});
				}
				window.addEventListener('orientationchange', () => {
					setTimeout(() => {
						dpr = Math.min(window.devicePixelRatio || 1, 2);
						positionGlow();
						const { w, h } = sizeCanvas();
						regenerateStars(w, h);
						if (rm.matches) drawStars(0);
					}, 200);
				});

				toast.addEventListener('click', hideToast);
				window.addEventListener('keydown', (e) => {
					if (e.key === 'Escape') hideToast();
				});
			})();
		</script>
	</body>
</html>
