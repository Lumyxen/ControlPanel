<!-- www/login.html -->
<!DOCTYPE html>
<html lang="en" data-theme="everforest-harddark-green">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Control Panel — Unlock</title>
	<link rel="icon" href="favicon.ico" />
	<link rel="stylesheet" href="css/variables.css" />
	<link rel="stylesheet" href="css/base.css" />
	<link rel="stylesheet" href="css/login.css" />

	<script>
		(function () {
			try {
				var t = localStorage.getItem('ctrlpanel:theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			} catch (_) {}
		})();
	</script>
</head>

<body class="login-page">
	<canvas id="starfield" aria-hidden="true"></canvas>

	<div class="auth-wrap">
		<div class="auth-card">
			<div class="auth-header">
				<h1 id="auth-title">Unlock Panel</h1>
				<p id="auth-subtitle">Enter your password to unlock the control panel.</p>
			</div>

			<!-- Error box -->
			<div id="error-box" hidden role="alert" aria-live="assertive"></div>

			<!-- Form -->
			<form id="auth-form" novalidate>
				<div class="auth-form-fields">
					<div class="field-group">
						<label for="password">Password</label>
						<input
							id="password"
							type="password"
							autocomplete="current-password"
							spellcheck="false"
							placeholder="Enter your password"
							required
						/>
					</div>

					<div id="confirm-group" class="field-group" hidden>
						<label for="confirm">Confirm password</label>
						<input
							id="confirm"
							type="password"
							autocomplete="new-password"
							spellcheck="false"
							placeholder="Confirm your password"
						/>
					</div>

					<button id="submit-btn" type="submit" aria-busy="false">
						Unlock
					</button>
				</div>
			</form>
		</div>
	</div>

	<script type="module" src="js/login.js?v=2"></script>
</body>

</html>
