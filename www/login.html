<!-- www/login.html -->
<!DOCTYPE html>
<html lang="en" data-theme="everforest-harddark-green">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Control Panel — Unlock</title>
	<link rel="stylesheet" href="css/variables.css" />
	<link rel="stylesheet" href="css/base.css" />
	<style>
		/* ── Apply theme before paint ─────────────────────────────────────── */
		html, body { height: 100%; margin: 0; overflow: hidden; }

		/* ── Starfield canvas ─────────────────────────────────────────────── */
		#starfield {
			position: fixed;
			inset: 0;
			z-index: 0;
			pointer-events: none;
		}

		/* ── Login container ──────────────────────────────────────────────── */
		.auth-wrap {
			position: relative;
			z-index: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 24px;
		}

		.auth-card {
			width: 100%;
			max-width: 380px;
			background: var(--panel);
			border: 1px solid var(--border);
			padding: 32px;
			display: flex;
			flex-direction: column;
			gap: 20px;
			box-shadow: 0 8px 40px rgba(0,0,0,0.4);
		}

		/* ── Mode banner ──────────────────────────────────────────────────── */
		.mode-banner {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 8px 12px;
			font-size: 0.78rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			border: 1px solid;
			width: fit-content;
		}

		.mode-banner.mode-unlock {
			color: var(--ef-aqua, var(--ctp-teal, #83c092));
			border-color: color-mix(in srgb, var(--ef-aqua, var(--ctp-teal, #83c092)) 40%, transparent);
			background: color-mix(in srgb, var(--ef-aqua, var(--ctp-teal, #83c092)) 8%, transparent);
		}

		.mode-banner.mode-setup {
			color: var(--ef-yellow, var(--ctp-yellow, #dbbc7f));
			border-color: color-mix(in srgb, var(--ef-yellow, var(--ctp-yellow, #dbbc7f)) 40%, transparent);
			background: color-mix(in srgb, var(--ef-yellow, var(--ctp-yellow, #dbbc7f)) 8%, transparent);
		}

		#mode-icon {
			width: 14px;
			height: 14px;
			flex-shrink: 0;
			display: block;
		}

		/* ── Header ───────────────────────────────────────────────────────── */
		.auth-header { display: flex; flex-direction: column; gap: 6px; }

		#auth-title {
			margin: 0;
			font-size: 1.3rem;
			font-weight: 700;
			color: var(--text);
		}

		#auth-subtitle {
			margin: 0;
			font-size: 0.875rem;
			color: var(--muted);
			line-height: 1.5;
		}

		/* ── Error box ────────────────────────────────────────────────────── */
		#error-box {
			padding: 10px 12px;
			font-size: 0.85rem;
			color: var(--ef-red, var(--ctp-red, #e67e80));
			background: color-mix(in srgb, var(--ef-red, var(--ctp-red, #e67e80)) 10%, transparent);
			border: 1px solid color-mix(in srgb, var(--ef-red, var(--ctp-red, #e67e80)) 30%, transparent);
			border-left: 3px solid var(--ef-red, var(--ctp-red, #e67e80));
		}

		/* ── Fields ───────────────────────────────────────────────────────── */
		.field-group { display: flex; flex-direction: column; gap: 8px; }

		.field-group label {
			font-size: 0.82rem;
			color: var(--muted);
			font-weight: 500;
		}

		.field-group input[type="password"] {
			appearance: none;
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--text);
			font: inherit;
			font-size: 0.95rem;
			padding: 10px 12px;
			width: 100%;
			box-sizing: border-box;
			transition: border-color 0.15s ease, box-shadow 0.15s ease;
		}

		.field-group input[type="password"]:focus {
			outline: none;
			border-color: var(--accent);
			box-shadow: 0 0 0 1px var(--accent);
		}

		/* ── Submit button ────────────────────────────────────────────────── */
		#submit-btn {
			appearance: none;
			background: var(--accent);
			border: 1px solid var(--accent);
			color: var(--bg);
			font: inherit;
			font-size: 0.95rem;
			font-weight: 600;
			padding: 11px 16px;
			cursor: pointer;
			width: 100%;
			transition: opacity 0.15s ease;
			border-radius: var(--radius-none);
		}

		#submit-btn:hover { opacity: 0.88; }
		#submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
	</style>

	<script>
		(function () {
			try {
				var t = localStorage.getItem('ctrlpanel:theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			} catch (_) {}
		})();
	</script>
</head>

<body>
	<canvas id="starfield" aria-hidden="true"></canvas>

	<div class="auth-wrap">
		<div class="auth-card">

			<!-- Mode banner -->
			<div id="mode-banner" class="mode-banner mode-unlock" aria-label="Mode">
				<svg id="mode-icon" viewBox="0 0 24 24" fill="none"
					stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round"
					aria-hidden="true" focusable="false">
					<rect x="3" y="11" width="18" height="11"></rect>
					<path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
				</svg>
				<span id="mode-label">Unlock</span>
			</div>

			<!-- Header -->
			<div class="auth-header">
				<h1 id="auth-title">Unlock Panel</h1>
				<p id="auth-subtitle">Enter your password to unlock the control panel.</p>
			</div>

			<!-- Error box -->
			<div id="error-box" hidden role="alert" aria-live="assertive"></div>

			<!-- Form -->
			<form id="auth-form" novalidate>
				<div style="display:flex;flex-direction:column;gap:14px;">
					<div class="field-group">
						<label for="password">Password</label>
						<input
							id="password"
							type="password"
							autocomplete="current-password"
							spellcheck="false"
							placeholder="Enter your password"
							required
						/>
					</div>

					<div id="confirm-group" class="field-group" hidden>
						<label for="confirm">Confirm password</label>
						<input
							id="confirm"
							type="password"
							autocomplete="new-password"
							spellcheck="false"
							placeholder="Confirm your password"
						/>
					</div>

					<button id="submit-btn" type="submit" aria-busy="false">
						Unlock
					</button>
				</div>
			</form>
		</div>
	</div>

	<script>
		/* ── Starfield canvas ──────────────────────────────────────────────── */
		(function () {
			const canvas = document.getElementById('starfield');
			if (!canvas) return;
			const ctx    = canvas.getContext('2d');
			let stars    = [];
			const COUNT  = 160;

			function resize() {
				canvas.width  = window.innerWidth;
				canvas.height = window.innerHeight;
			}

			function makeStars() {
				stars = [];
				for (let i = 0; i < COUNT; i++) {
					stars.push({
						x:     Math.random() * canvas.width,
						y:     Math.random() * canvas.height,
						r:     Math.random() * 1.4 + 0.15,
						a:     Math.random() * 0.65 + 0.2,
						da:    (Math.random() - 0.5) * 0.008,
						speed: Math.random() * 0.006 + 0.001,
					});
				}
			}

			function draw() {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				for (const s of stars) {
					s.a = Math.max(0.05, Math.min(0.9, s.a + s.da));
					if (s.a <= 0.05 || s.a >= 0.9) s.da *= -1;
					ctx.beginPath();
					ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
					/* Use everforest fg colour with opacity */
					ctx.fillStyle = `rgba(211, 198, 170, ${s.a})`;
					ctx.fill();
				}
				requestAnimationFrame(draw);
			}

			resize();
			makeStars();
			draw();

			window.addEventListener('resize', function () { resize(); makeStars(); });
		})();
	</script>

	<script type="module" src="js/login.js?v=2"></script>
</body>

</html>
