	<!--
		Auth pre-check — runs synchronously before any rendering.

		We cannot do the full async auth check (which includes asking peer tabs
		via BroadcastChannel) from an inline script, so instead:
		  1. Hide the page immediately to prevent any content flash.
		  2. Apply the saved theme so there is no colour flash either.
		  3. If the session key is already in sessionStorage (same tab refresh,
		     or the key was already synced by a previous load), skip straight
		     to showing the page. The async module (app.js) will handle the
		     BroadcastChannel sync for the "no key yet" case and either reveal
		     the page or redirect.
	-->
	<script>
		(function () {
			// Apply saved theme before any paint.
			try {
				var t = localStorage.getItem('ctrlpanel:theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
			} catch (_) {}

			// Hide page until the async auth check in app.js completes.
			// app.js sets visibility back to '' after confirming the key.
			// If the key is already present (refreshed tab), unhide immediately
			// so there is zero visible delay for the common case.
			if (!sessionStorage.getItem('ctrlpanel:sessionToken')) {
				document.documentElement.style.visibility = 'hidden';
			}
		})();
	</script>


</head>

						</path>
					</svg>

				<input id="sidebarSearch" type="search" placeholder="Search pages" aria-label="Search pages"

								<path d="M2 14h2"/>
								<path d="M20 14h2"/>

					Lock button.

					  - Broadcasts key-revoke to all other open tabs

					aria-label="Lock panel">
